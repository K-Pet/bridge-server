services:
  bridge-music:
    build: .
    ports:
      - "8080:8080"
    volumes:
      # Point this at wherever your music will live. Everything else is
      # bridge-server state — leave the defaults.
      - ${MUSIC_DIR:-./data/music}:/data/music
      - ./data/navidrome:/data/navidrome
      - ./data/bridge:/data/bridge
    environment:
      # ── User-facing config ──────────────────────────────────────────
      # Friendly name shown in the marketplace ("Living Room", etc.).
      BRIDGE_LABEL: ${BRIDGE_LABEL:-My Bridge Server}
      # Publicly-reachable URL of this server. The marketplace fans
      # purchases out to ${BRIDGE_EXTERNAL_URL}/api/webhook/purchase.
      # Use a real domain or a Cloudflare Tunnel URL — see
      # docs/PRODUCTION_SETUP.md.
      BRIDGE_EXTERNAL_URL: ${BRIDGE_EXTERNAL_URL}

      # ── Operator-supplied (Phase 2b will eliminate this last one) ──
      # Supabase service-role key for the Bridge Music project.
      # Currently still required because bridge-server makes service-
      # role writes (auto-pair, mark-delivered, signed-storage-URLs)
      # via PostgREST. Phase 2b moves these behind Edge Functions
      # authenticated by the auto-minted webhook_secret, after which
      # this var goes away too.
      BRIDGE_SUPABASE_SERVICE_KEY: ${BRIDGE_SUPABASE_SERVICE_KEY}

      # ── Auto-managed (do not set unless you know why) ──────────────
      # Delivery: webhook (push, default) or poll. Use poll if you
      # can't expose BRIDGE_EXTERNAL_URL to the public internet.
      BRIDGE_DELIVERY_MODE: ${BRIDGE_DELIVERY_MODE:-webhook}
      BRIDGE_POLL_INTERVAL: ${BRIDGE_POLL_INTERVAL:-5m}
      # BRIDGE_SERVER_ID and BRIDGE_WEBHOOK_SECRET are auto-minted at
      # first boot and persisted to /data/bridge/credentials.json. To
      # rotate either, delete that file and restart — the marketplace
      # will re-pair on the next user sign-in.
      # BRIDGE_SUPABASE_URL / BRIDGE_SUPABASE_ANON_KEY are baked into
      # the image; override at build time with --build-arg if you fork
      # the project.
    restart: unless-stopped
