services:
  bridge-music:
    # Pull pre-built image from GHCR (published by .github/workflows/docker.yml
    # on every push to main). Use this for Portainer stacks and any deploy
    # path where the source isn't checked out alongside the compose file.
    image: ghcr.io/k-pet/bridge-server:latest
    # For local-source workflows (developing inside this repo), comment out
    # the `image:` line above and uncomment the build block below.
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: bridge-server
    restart: unless-stopped
    # Internal-only — nginx-proxy-manager (running in another stack on the
    # `npm_network` below) terminates TLS and routes /* here. Don't publish
    # 8888 to the host; that would expose the bare HTTP API to the LAN
    # alongside NPM's HTTPS.
    expose:
      - "8888"
    networks:
      - npm
    volumes:
      # Music library: bind-mounted so you can drop files in from the
      # host (e.g. rsync, manual imports). Override MUSIC_DIR in .env to
      # point at the disk where your library lives.
      - ${MUSIC_DIR:-./data/music}:/data/music
      # Internal state: named Docker volumes. These survive stack
      # recreation under Portainer / `docker compose down -v ...up` —
      # relative bind mounts (the previous default) re-resolve against
      # whatever directory the stack happens to be deployed from, which
      # silently dropped Navidrome's DB and the bridge-server admin
      # credentials on every Portainer "Update stack". Named volumes
      # live under /var/lib/docker/volumes/ and are pinned by name.
      - bridge-navidrome:/data/navidrome
      - bridge-data:/data/bridge
    environment:
      # ── User-facing config ──────────────────────────────────────────
      # Friendly name shown in the marketplace ("Living Room", etc.).
      BRIDGE_LABEL: ${BRIDGE_LABEL:-My Bridge Server}
      # Publicly-reachable URL of this server. The marketplace fans
      # purchases out to ${BRIDGE_EXTERNAL_URL}/api/webhook/purchase.
      # Use a real domain or a Cloudflare Tunnel URL — see
      # docs/PRODUCTION_SETUP.md.
      BRIDGE_EXTERNAL_URL: ${BRIDGE_EXTERNAL_URL}

      # ── Auto-managed (do not set unless you know why) ──────────────
      # Delivery: webhook (push, default) or poll. Use poll if you
      # can't expose BRIDGE_EXTERNAL_URL to the public internet.
      BRIDGE_DELIVERY_MODE: ${BRIDGE_DELIVERY_MODE:-webhook}
      BRIDGE_POLL_INTERVAL: ${BRIDGE_POLL_INTERVAL:-5m}
      # BRIDGE_SERVER_ID and BRIDGE_WEBHOOK_SECRET are auto-minted at
      # first boot and persisted to /data/bridge/credentials.json. To
      # rotate either, delete that file and restart — the marketplace
      # will re-pair on the next user sign-in.
      # BRIDGE_SUPABASE_URL / BRIDGE_SUPABASE_ANON_KEY are baked into
      # the image; override at build time with --build-arg if you fork
      # the project.
    # Lets Portainer / docker swarm tell at a glance whether the
    # container is actually healthy (the s6 init succeeds before
    # bridge-server's own port opens, so a port-only liveness probe
    # would lie during boot).
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8888/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# The marketplace runs in its own Portainer stack at its own public
# domain (e.g. market.bykobejean.com) — see the docker-compose.yml in
# the Bridge-Music-Marketplace repo. Cross-origin handshake; the
# marketplace's EXPO_PUBLIC_EMBED_ORIGINS allowlist gates session
# forwarding from this bridge-server's frontend.

# Named volumes — see notes on the bridge-music service above.
# To migrate existing data from the old `./data/{navidrome,bridge}` bind
# mounts, run `docker run --rm -v "$PWD/data/navidrome:/src" -v
# bridge-navidrome:/dst alpine cp -a /src/. /dst/` (and the same for
# bridge-data) before bringing the new stack up.
volumes:
  bridge-navidrome:
  bridge-data:

# Bridge-server joins the network NPM was deployed on so it can resolve
# `bridge-server` by container name in its Forward Hostname field.
# Update the network name below to match your NPM stack — find it with
# `docker network ls` (typically `<npm-stack-name>_default`).
networks:
  npm:
    name: npm_default
    external: true
